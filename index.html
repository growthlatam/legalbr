<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Legal BR · Maio/2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--tr-orange:#FA6400;--tr-orange-deep:#D85400;--tr-orange-soft:#FFE8D9;--tr-green:#2C7A4F;--tr-green-deep:#1F5A39;--tr-green-soft:#D7E9DD;--tr-ink:#1A1A1A;--tr-ink-soft:#4A4A4A;--tr-paper:#FAF7F2;--tr-paper-warm:#F2EDE4;--tr-line-soft:#D9D2C5}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--tr-paper);color:var(--tr-ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.lp-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(250,247,242,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--tr-line-soft)}
.lp-brand{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px}
.lp-brand::before{content:'';width:22px;height:3px;background:var(--tr-orange)}
.lp-progress-track{flex:1;max-width:360px;height:2px;background:var(--tr-line-soft);position:relative;overflow:hidden;margin:0 24px}
.lp-progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--tr-orange),var(--tr-green));transition:width .1s linear}
.lp-print-btn{display:inline-flex;align-items:center;gap:6px;background:var(--tr-orange);color:#fff;border:none;padding:8px 16px;font-family:'Manrope',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.lp-print-btn:hover{background:var(--tr-orange-deep)}
.lp-hero{height:100vh;min-height:600px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:0 32px}
.lp-hero-grain{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 25% 30%,var(--tr-orange-soft) 0%,transparent 35%),radial-gradient(circle at 75% 70%,var(--tr-green-soft) 0%,transparent 35%);opacity:.55}
.lp-hero-inner{max-width:1100px;width:100%;position:relative;z-index:1}
.lp-eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--tr-orange);margin-bottom:36px;display:flex;align-items:center;gap:14px}
.lp-eyebrow::before{content:'';width:48px;height:3px;background:var(--tr-orange)}
.lp-hero-title{font-family:'Sora',sans-serif;font-size:clamp(72px,14vw,200px);line-height:.86;font-weight:700;letter-spacing:-.065em;margin-bottom:44px;text-transform:uppercase}
.lp-hero-title em{font-style:italic;font-weight:300;color:var(--tr-green);letter-spacing:-.04em;text-transform:none;font-size:.55em;display:inline-block;margin-top:.1em}
.lp-hero-meta{display:flex;gap:56px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tr-ink-soft);letter-spacing:.1em;text-transform:uppercase}
.lp-hero-meta strong{color:var(--tr-ink);font-weight:700;display:block;margin-bottom:4px}
.lp-scroll-cue{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--tr-ink-soft);animation:bounce 2.4s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,10px)}}
.lp-section{padding:120px 32px;min-height:80vh;display:flex;align-items:center;position:relative}
.lp-section-inner{max-width:1100px;margin:0 auto;width:100%}
.lp-section-num{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--tr-orange);margin-bottom:24px}
.lp-section:nth-of-type(even) .lp-section-num{color:var(--tr-green)}
.lp-section-title{font-family:'Sora',sans-serif;font-size:clamp(40px,6vw,72px);line-height:.95;font-weight:600;letter-spacing:-.045em;margin-bottom:60px}
.lp-narrative-sec{background:var(--tr-ink);color:var(--tr-paper)}
.lp-narrative-sec .lp-section-num{color:var(--tr-orange)}
.lp-narrative-summary{font-family:'Sora',sans-serif;font-size:clamp(22px,2.6vw,32px);line-height:1.4;font-weight:300;letter-spacing:-.025em;max-width:900px;margin-bottom:60px}
.lp-narrative-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}
.lp-narrative-col-title{font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;margin-bottom:18px;color:var(--tr-orange)}
.lp-narrative-col-title.green{color:var(--tr-green-soft)}
.lp-narrative-col ul{list-style:none}
.lp-narrative-col li{padding:12px 0 12px 18px;position:relative;font-size:15px;line-height:1.5;color:rgba(250,247,242,.88);border-bottom:1px solid rgba(250,247,242,.08)}
.lp-narrative-col li::before{content:'→';position:absolute;left:0;color:var(--tr-orange)}
.lp-narrative-col.green li::before{content:'↗';color:var(--tr-green-soft)}
.lp-bignum{margin-bottom:80px}
.lp-bignum-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--tr-ink-soft);font-weight:600;margin-bottom:16px}
.lp-bignum-val{font-family:'Sora',sans-serif;font-size:clamp(64px,12vw,180px);line-height:.9;font-weight:600;letter-spacing:-.06em;color:var(--tr-orange)}
.lp-split{margin:60px 0}
.lp-split-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--tr-ink-soft);font-weight:600;margin-bottom:16px}
.lp-split-bar{display:flex;height:80px;border:1px solid var(--tr-ink);overflow:hidden}
.lp-split-base,.lp-split-new{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:0 24px;color:#fff;width:0;transition:width 1.4s cubic-bezier(.16,1,.3,1)}
.lp-split.in .lp-split-base,.lp-split.in .lp-split-new{width:var(--w)}
.lp-split-base{background:var(--tr-ink)}
.lp-split-new{background:var(--tr-green)}
.lp-split-num{font-family:'Sora',sans-serif;font-size:24px;font-weight:600;letter-spacing:-.03em;line-height:1}
.lp-split-name{font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-top:4px;opacity:.85}
.lp-split-values{display:flex;justify-content:space-between;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tr-ink-soft)}
.lp-bars{margin-top:60px}
.lp-bars-title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--tr-ink-soft);font-weight:600;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--tr-ink)}
.lp-bar-row{margin-bottom:22px}
.lp-bar-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.lp-bar-name{font-family:'Sora',sans-serif;font-size:20px;font-weight:500;letter-spacing:-.02em}
.lp-bar-val{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--tr-orange-deep);font-weight:600}
.lp-bar-track{height:12px;background:var(--tr-paper-warm);overflow:hidden}
.lp-bar-fill{height:100%;width:0;transition:width 1.4s cubic-bezier(.16,1,.3,1)}
.lp-bar-row.in .lp-bar-fill{width:var(--w)}
.lp-bar-fill.orange{background:var(--tr-orange)}.lp-bar-fill.ink{background:var(--tr-ink)}
.lp-funnel{display:flex;flex-direction:column;gap:14px}
.lp-funnel-row{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.lp-funnel-bar{background:linear-gradient(90deg,var(--tr-ink) 0%,var(--tr-orange) 100%);color:#fff;padding:22px 28px;display:flex;justify-content:space-between;align-items:baseline;width:0;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.lp-funnel-row.in .lp-funnel-bar{width:var(--w)}
.lp-funnel-name{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;letter-spacing:-.02em;text-transform:uppercase}
.lp-funnel-count{font-family:'Sora',sans-serif;font-size:40px;font-weight:600;letter-spacing:-.04em;line-height:1}
.lp-funnel-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--tr-ink-soft);letter-spacing:.06em}
.lp-cycle-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.lp-cycle-card{padding:48px 36px;border:1px solid var(--tr-ink);background:var(--tr-paper)}
.lp-cycle-card.positive{border-color:var(--tr-green);background:var(--tr-green-soft)}
.lp-cycle-card.negative{border-color:var(--tr-orange);background:var(--tr-orange-soft)}
.lp-cycle-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--tr-ink-soft);font-weight:600;margin-bottom:20px}
.lp-cycle-val{font-family:'Sora',sans-serif;font-size:clamp(48px,7vw,96px);font-weight:600;letter-spacing:-.05em;line-height:1}
.lp-cycle-card.positive .lp-cycle-val{color:var(--tr-green-deep)}
.lp-cycle-card.negative .lp-cycle-val{color:var(--tr-orange-deep)}
.lp-cycle-val small{font-size:.4em;color:var(--tr-ink-soft);font-weight:400}
.lp-campaigns{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.lp-campaign-card{background:var(--tr-paper-warm);border-left:3px solid var(--tr-orange);overflow:hidden;display:flex;flex-direction:column;transition:transform .3s}
.lp-campaign-card:hover{transform:translateY(-4px)}
.lp-campaign-creative{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--tr-ink);position:relative;cursor:zoom-in}
.lp-campaign-creative img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.lp-campaign-card:hover .lp-campaign-creative img{transform:scale(1.06)}
.lp-creative-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,26,26,0) 50%,rgba(26,26,26,.55) 100%);opacity:.6;transition:opacity .3s;pointer-events:none}
.lp-campaign-card:hover .lp-creative-overlay{opacity:1}
.lp-creative-expand{position:absolute;top:12px;right:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(26,26,26,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:0;cursor:pointer;opacity:0;transform:translateY(-6px);transition:opacity .3s,transform .3s,background .2s;pointer-events:none}
.lp-campaign-card:hover .lp-creative-expand{opacity:1;transform:translateY(0)}
.lp-creative-expand:hover{background:var(--tr-orange);border-color:var(--tr-orange)}
.lp-campaign-creative:focus-visible{outline:2px solid var(--tr-orange);outline-offset:2px}
.lp-lightbox{position:fixed;inset:0;z-index:1000;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:5vh 5vw;opacity:0;pointer-events:none;transition:opacity .3s cubic-bezier(.16,1,.3,1)}
.lp-lightbox.open{opacity:1;pointer-events:auto}
.lp-lightbox-figure{margin:0;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:16px;transform:scale(.96);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.lp-lightbox.open .lp-lightbox-figure{transform:scale(1)}
.lp-lightbox-figure img{max-width:100%;max-height:80vh;object-fit:contain;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
.lp-lightbox-caption{font-family:'Sora',sans-serif;font-size:14px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:-.01em;text-align:center;max-width:600px}
.lp-lightbox-close{position:fixed;top:24px;right:24px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;transition:background .2s,transform .2s;z-index:1001}
.lp-lightbox-close:hover{background:var(--tr-orange);border-color:var(--tr-orange);transform:rotate(90deg)}
.lp-campaign-body{padding:28px}
.lp-campaign-name{font-family:'Sora',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.03em;margin-bottom:20px;line-height:1.15}
.lp-campaign-metrics{display:flex;gap:32px;flex-wrap:wrap}
.lp-metric{display:flex;flex-direction:column;gap:4px}
.lp-metric-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--tr-ink-soft);font-weight:600}
.lp-metric-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600}
.lp-metric-val.orange{color:var(--tr-orange-deep)}.lp-metric-val.green{color:var(--tr-green-deep)}
.lp-content-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.lp-content-card{padding:28px;border:1px solid var(--tr-line-soft);background:var(--tr-paper);transition:all .3s;display:flex;flex-direction:column;text-decoration:none;color:var(--tr-ink)}
.lp-content-card:hover{border-color:var(--tr-green);transform:translateY(-3px)}
.lp-content-card.linkable:hover{border-color:var(--tr-orange);box-shadow:0 8px 24px -12px rgba(250,100,0,.3)}
.lp-content-tag{align-self:flex-start;padding:4px 10px;background:var(--tr-green);color:#fff;font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:18px}
.lp-content-card.linkable .lp-content-tag{background:var(--tr-orange)}
.lp-content-title{font-family:'Sora',sans-serif;font-size:19px;font-weight:600;letter-spacing:-.025em;line-height:1.25;margin-bottom:14px;flex:1}
.lp-content-foot{display:flex;justify-content:space-between;align-items:center;gap:12px}
.lp-content-channel{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tr-ink-soft);letter-spacing:.08em}
.lp-content-arrow{font-size:18px;color:var(--tr-orange);font-weight:600;transition:transform .3s}
.lp-content-card.linkable:hover .lp-content-arrow{transform:translate(3px,-3px)}
.lp-projects-sec.growth{background:linear-gradient(180deg,var(--tr-paper) 0%,var(--tr-green-soft) 100%)}
.lp-projects{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.lp-project-card{display:flex;gap:18px;padding:24px;background:rgba(255,255,255,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--tr-line-soft)}
.lp-project-bullet{width:10px;height:10px;background:var(--tr-orange);margin-top:8px;flex-shrink:0}
.lp-projects-sec.growth .lp-project-bullet{background:var(--tr-green)}
.lp-project-name{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;letter-spacing:-.025em;margin-bottom:6px}
.lp-project-meta{font-size:12px;color:var(--tr-ink-soft);letter-spacing:.04em}
.lp-project-meta span{margin-right:6px}
.lp-end{padding:160px 32px 120px;background:var(--tr-ink);color:var(--tr-paper);text-align:center}
.lp-end-bar{display:inline-block;width:60px;height:4px;background:var(--tr-orange);margin-bottom:32px}
.lp-end-text{font-family:'Sora',sans-serif;font-size:clamp(36px,5vw,56px);font-weight:600;letter-spacing:-.045em;margin-bottom:24px}
.lp-end-meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,247,242,.5)}
.lp-reveal{opacity:0;transform:translateY(40px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
.lp-reveal.in{opacity:1;transform:translateY(0)}
@media print{.lp-nav{display:none!important}.lp-reveal{opacity:1!important;transform:none!important}.lp-section{page-break-inside:avoid;min-height:auto;padding:40px 24px}.lp-hero{height:auto;min-height:auto;padding:60px 24px;page-break-after:always}.lp-hero-title{font-size:72px!important}.lp-bignum-val{font-size:100px!important}.lp-bar-row .lp-bar-fill,.lp-split .lp-split-base,.lp-split .lp-split-new,.lp-funnel-row .lp-funnel-bar{width:var(--w)!important}@page{size:A4;margin:12mm}}
@media (max-width:900px){.lp-narrative-grid,.lp-campaigns,.lp-content-grid,.lp-projects{grid-template-columns:1fr}.lp-cycle-grid{grid-template-columns:1fr}.lp-section{padding:80px 24px;min-height:auto}.lp-hero-meta{flex-direction:column;gap:16px}.lp-nav{padding:12px 20px}.lp-progress-track{margin:0 12px}}
</style>
</head>
<body>
<nav class="lp-nav">
  <div class="lp-brand" id="navBrand">Relatório</div>
  <div class="lp-progress-track"><div class="lp-progress-fill" id="progressFill"></div></div>
  <button class="lp-print-btn" onclick="window.print()">PDF ↓</button>
</nav>
<section class="lp-hero">
  <div class="lp-hero-grain"></div>
  <div class="lp-hero-inner">
    <div class="lp-eyebrow" id="heroEyebrow"></div>
    <h1 class="lp-hero-title" id="heroTitle"><span id="heroBU">—</span><br><em id="heroMonth">—</em></h1>
    <div class="lp-hero-meta" id="heroMeta">
      <div><strong id="lblWeek"></strong><span id="heroWeek">—</span></div>
      <div><strong id="lblAuthor"></strong><span id="heroAuthor">—</span></div>
    </div>
    <div class="lp-scroll-cue" id="scrollCue"><span id="scrollLbl"></span></div>
  </div>
</section>
<section class="lp-section lp-narrative-sec" id="narrativeSec" style="display:none">
  <div class="lp-section-inner">
    <div class="lp-section-num lp-reveal">§ 00</div>
    <h2 class="lp-section-title lp-reveal" id="narrativeTitle"></h2>
    <p class="lp-narrative-summary lp-reveal" id="narrativeSummary"></p>
    <div class="lp-narrative-grid">
      <div class="lp-narrative-col green lp-reveal"><div class="lp-narrative-col-title green" id="lblHighlights"></div><ul id="narrativeHighlights"></ul></div>
      <div class="lp-narrative-col lp-reveal"><div class="lp-narrative-col-title" id="lblRisks"></div><ul id="narrativeRisks"></ul></div>
      <div class="lp-narrative-col lp-reveal"><div class="lp-narrative-col-title" id="lblNext"></div><ul id="narrativeNextSteps"></ul></div>
    </div>
  </div>
</section>
<section class="lp-section" id="pipelineSec" style="display:none">
  <div class="lp-section-inner">
    <div class="lp-section-num lp-reveal">§ 01</div>
    <h2 class="lp-section-title lp-reveal" id="pipeTitle"></h2>
    <div class="lp-bignum lp-reveal" id="pipelineBigNum"><div class="lp-bignum-label" id="lblPipeTotal"></div><div class="lp-bignum-val" id="pipelineTotal">—</div></div>
    <div class="lp-split lp-reveal" id="splitBar" style="display:none"><div class="lp-split-label" id="lblBaseVsNew"></div><div class="lp-split-bar"><div class="lp-split-base" id="splitBase"><span class="lp-split-num" id="splitBasePct">—</span><span class="lp-split-name" id="lblBase"></span></div><div class="lp-split-new" id="splitNew"><span class="lp-split-num" id="splitNewPct">—</span><span class="lp-split-name" id="lblNewLogos"></span></div></div><div class="lp-split-values"><span id="splitBaseVal">—</span><span id="splitNewVal">—</span></div></div>
    <div class="lp-bars" id="bursWrap" style="display:none"><div class="lp-bars-title" id="lblByBU"></div><div id="bursContainer"></div></div>
    <div class="lp-bars" id="productsWrap" style="display:none"><div class="lp-bars-title" id="lblByProd"></div><div id="productsContainer"></div></div>
  </div>
</section>
<section class="lp-section" id="stagesSec" style="display:none">
  <div class="lp-section-inner">
    <div class="lp-section-num lp-reveal">§ 02</div>
    <h2 class="lp-section-title lp-reveal" id="stagesTitle"></h2>
    <div class="lp-funnel" id="funnelContainer"></div>
  </div>
</section>
<section class="lp-section" id="cycleSec" style="display:none">
  <div class="lp-section-inner">
    <div class="lp-section-num lp-reveal">§ 03</div>
    <h2 class="lp-section-title lp-reveal" id="cycleSecTitle"></h2>
    <div class="lp-cycle-grid">
      <div class="lp-cycle-card lp-reveal"><div class="lp-cycle-label" id="lblCycleDays"></div><div class="lp-cycle-val"><span id="cycleDays">—</span><small id="lblDays"></small></div></div>
      <div class="lp-cycle-card lp-reveal" id="cycleVarCard"><div class="lp-cycle-label" id="lblCycleVar"></div><div class="lp-cycle-val" id="cycleVar">—</div></div>
    </div>
  </div>
</section>
<section class="lp-section" id="campaignsSec" style="display:none">
  <div class="lp-section-inner">
    <div class="lp-section-num lp-reveal">§ 04</div>
    <h2 class="lp-section-title lp-reveal" id="campaignsTitle"></h2>
    <div class="lp-campaigns" id="campaignsContainer"></div>
  </div>
</section>
<section class="lp-section" id="contentSec" style="display:none">
  <div class="lp-section-inner">
    <div class="lp-section-num lp-reveal">§ 05</div>
    <h2 class="lp-section-title lp-reveal" id="contentTitle"></h2>
    <div class="lp-content-grid" id="contentContainer"></div>
  </div>
</section>
<section class="lp-section lp-projects-sec growth" id="growthSec" style="display:none">
  <div class="lp-section-inner">
    <div class="lp-section-num lp-reveal">§ 06</div>
    <h2 class="lp-section-title lp-reveal" id="growthTitle"></h2>
    <div class="lp-projects" id="growthContainer"></div>
  </div>
</section>

  document.getElementById("campaignsContainer").innerHTML=D.campaigns.map((c,i)=>{
    const safeName=(c.name||"").replace(/"/g,"&quot;");
    const creative=c.creative?'<div class="lp-campaign-creative" data-lightbox="1" data-src="'+c.creative+'" data-caption="'+safeName+'" role="button" tabindex="0" aria-label="Ampliar imagem"><img src="'+c.creative+'" alt="'+safeName+'" loading="lazy"/><div class="lp-creative-overlay"></div><button class="lp-creative-expand" type="button" aria-label="Ampliar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button></div>':"";
    return '<div class="lp-campaign-card lp-reveal" style="transition-delay:'+(i*.1)+'s">'+creative+'<div class="lp-campaign-body"><div class="lp-campaign-name">'+c.name+'</div><div class="lp-campaign-metrics">'+(c.pipeline?'<div class="lp-metric"><span class="lp-metric-label">Pipeline</span><span class="lp-metric-val orange">'+fm(c.pipeline)+'</span></div>':"")+(c.closed?'<div class="lp-metric"><span class="lp-metric-label">'+T.closed+'</span><span class="lp-metric-val green">'+fm(c.closed)+'</span></div>':"")+'</div></div></div>';
  }).join("");
}
// Content
if(D.content.length){
  document.getElementById("contentSec").style.display="";
  document.getElementById("contentTitle").textContent=T.content;
  document.getElementById("contentContainer").innerHTML=D.content.map((c,i)=>{const tag=c.link?"a":"div";const attrs=c.link?' href="'+c.link+'" target="_blank" rel="noopener noreferrer"':"";const cls=c.link?" linkable":"";const arrow=c.link?'<span class="lp-content-arrow">↗</span>':"";return '<'+tag+' class="lp-content-card lp-reveal'+cls+'"'+attrs+' style="transition-delay:'+(i*.08)+'s"><div class="lp-content-tag">'+(c.type||"—")+'</div><div class="lp-content-title">'+c.title+'</div><div class="lp-content-foot"><span class="lp-content-channel">'+(c.channel||"—")+'</span>'+arrow+'</div></'+tag+'>'}).join("");
}
// Projects
const renderProjs=(arr)=>arr.map((p,i)=>'<div class="lp-project-card lp-reveal" style="transition-delay:'+(i*.08)+'s"><div class="lp-project-bullet"></div><div><div class="lp-project-name">'+p.name+'</div><div class="lp-project-meta">'+(p.status?'<span>'+p.status+'</span>':"")+(p.owner?'<span>· '+p.owner+'</span>':"")+'</div></div></div>').join("");
if(D.growth.length){document.getElementById("growthSec").style.display="";document.getElementById("growthTitle").textContent=T.growth;document.getElementById("growthContainer").innerHTML=renderProjs(D.growth);}
if(D.general.length){document.getElementById("generalSec").style.display="";document.getElementById("generalTitle").textContent=T.general;document.getElementById("generalContainer").innerHTML=renderProjs(D.general);}
// Reveal observer
const robs=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");robs.unobserve(e.target)}})},{threshold:.15,rootMargin:"0px 0px -10% 0px"});
document.querySelectorAll(".lp-reveal").forEach(el=>robs.observe(el));
const sobs=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");sobs.unobserve(e.target)}})},{threshold:.3});
sobs.observe(document.getElementById("splitBar"));
// Scroll: progress + parallax do hero (mesmo comportamento do React app)
const pf=document.getElementById("progressFill");
const sc=document.getElementById("scrollCue");
const ht=document.getElementById("heroTitle");
const he=document.getElementById("heroEyebrow");
const hm=document.getElementById("heroMeta");
let tick=false;
const onScroll=()=>{if(tick)return;tick=true;requestAnimationFrame(()=>{
  const y=window.scrollY;
  const h=document.documentElement.scrollHeight-window.innerHeight;
  pf.style.width=Math.min(100,y/h*100)+"%";
  if(ht){ht.style.transform="translateY("+(y*0.15)+"px)";ht.style.opacity=Math.max(0,1-y/600);}
  if(he){he.style.transform="translateY("+(y*0.3)+"px)";he.style.opacity=Math.max(0,1-y/400);}
  if(hm){hm.style.opacity=Math.max(0,1-y/300);}
  if(sc)sc.style.opacity=y<100?1:0;
  tick=false;
})};
window.addEventListener("scroll",onScroll,{passive:true});
onScroll();
// Lightbox — abre no click do creative
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lightboxImg");
const lbCap=document.getElementById("lightboxCaption");
const lbClose=document.getElementById("lightboxClose");
const openLB=(src,caption)=>{lbImg.src=src;lbImg.alt=caption||"";lbCap.textContent=caption||"";lb.classList.add("open");lb.setAttribute("aria-hidden","false");document.body.style.overflow="hidden"};
const closeLB=()=>{lb.classList.remove("open");lb.setAttribute("aria-hidden","true");document.body.style.overflow="";setTimeout(()=>{lbImg.src=""},300)};
document.addEventListener("click",(e)=>{
  const trigger=e.target.closest("[data-lightbox]");
  if(trigger){e.preventDefault();openLB(trigger.dataset.src,trigger.dataset.caption||"")}
});
document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape"&&lb.classList.contains("open"))closeLB();
  if(e.key==="Enter"||e.key===" "){
    const f=document.activeElement;
    if(f&&f.matches("[data-lightbox]")){e.preventDefault();openLB(f.dataset.src,f.dataset.caption||"")}
  }
});
lbClose.addEventListener("click",closeLB);
lb.addEventListener("click",(e)=>{if(e.target===lb||e.target.classList.contains("lp-lightbox-figure"))closeLB()});
})();
</script>
</body>
</html>
